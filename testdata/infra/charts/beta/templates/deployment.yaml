apiVersion: apps/v1
kind: Deployment
metadata:
  name: beta
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: beta
  template:
    metadata:
      labels:
        app: beta
    spec:
      containers:
        - name: beta
          image: {{ .Values.image }}
